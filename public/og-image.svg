<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C9A97A;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#C9A97A;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1A1410"/>

  <!-- Radial glow -->
  <ellipse cx="600" cy="315" rx="500" ry="400" fill="url(#glow)"/>

  <!-- Decorative rings -->
  <circle cx="600" cy="315" r="280" fill="none" stroke="#C9A97A" stroke-width="0.5" opacity="0.12"/>
  <circle cx="600" cy="315" r="200" fill="none" stroke="#C9A97A" stroke-width="0.5" opacity="0.18"/>

  <!-- Monogram box -->
  <rect x="554" y="150" width="92" height="48" fill="none" stroke="#C9A97A" stroke-width="1" opacity="0.6"/>
  <text
    x="600"
    y="180"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20"
    fill="#C9A97A"
    letter-spacing="4"
  >EN</text>

  <!-- Brand name -->
  <text
    x="600"
    y="280"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="76"
    font-weight="300"
    fill="#FDFAF6"
    letter-spacing="2"
  >Essentia Nails</text>

  <!-- Gold line -->
  <line x1="460" y1="310" x2="530" y2="310" stroke="#C9A97A" stroke-width="0.75" opacity="0.7"/>
  <circle cx="600" cy="310" r="3" fill="#C9A97A"/>
  <line x1="670" y1="310" x2="740" y2="310" stroke="#C9A97A" stroke-width="0.75" opacity="0.7"/>

  <!-- Tagline -->
  <text
    x="600"
    y="360"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    fill="#C9A97A"
    font-style="italic"
    opacity="0.9"
  >Tu mejor versión comienza aquí</text>

  <!-- Location -->
  <text
    x="600"
    y="420"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="16"
    fill="#FDFAF6"
    opacity="0.35"
    letter-spacing="4"
  >BEAUTY STUDIO · BUÑOL, VALENCIA</text>

  <!-- Bottom gold accent -->
  <rect x="0" y="620" width="1200" height="10" fill="#C9A97A" opacity="0.4"/>
</svg>
